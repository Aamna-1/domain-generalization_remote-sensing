# LoveDA LoRAReins Experiment Configuration
# Domain Generalization: Rural → Urban

experiment:
  name: "loveda_reins_r2u"
  description: "LoRAReins adaptation on LoveDA Rural→Urban domain shift"

model:
  backbone: "vit_small_plus_patch16_dinov3.lvd1689m"
  method: "reins"
  config: "R5"  # token_length=100, lora_dim=32
  
dataset:
  name: "loveda"
  scenario: "R2U"  # Rural → Urban
  num_classes: 7
  img_size: 1024
  
  paths:
    train_img: "data/loveda/Train/Rural/images_png"
    train_mask: "data/loveda/Train/Rural/masks_png"
    val_img: "data/loveda/Val/Rural/images_png"
    val_mask: "data/loveda/Val/Rural/masks_png"
    test_img: "data/loveda/Val/Urban/images_png"
    test_mask: "data/loveda/Val/Urban/masks_png"

training:
  batch_size: 2
  epochs: 3
  lr: 0.0002
  weight_decay: 0.01
  scheduler: "cosine"
  patience: 5
  
augmentation:
  grid_search: true
  alpha_p_values: [0.0, 0.2, 0.5, 0.8]
  alpha_g_values: [0.0, 15.0, 45.0, 90.0]

evaluation:
  seeds: [42, 123, 456]
  metrics: ["miou", "oa", "f1"]
  per_class: true

output:
  dir: "outputs/loveda_reins_r2u"
  save_checkpoints: true
  save_predictions: false
